<!DOCTYPE html>
<html>
<head>
<title>Upload Resume</title>
<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#eef2f3,#8e9eab);height:100vh;display:flex;justify-content:center;align-items:center;}
.container{background:white;padding:40px;width:420px;border-radius:15px;box-shadow:0 15px 25px rgba(0,0,0,0.15);text-align:center;}
h2{color:#1f3c88;}
.upload-box{border:2px dashed #4facfe;padding:30px;margin:25px 0;border-radius:10px;}
button{background:#1f3c88;color:white;padding:12px 25px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
button:hover{background:#16306b;}
.error{color:red;font-size:14px;}
</style>
</head>
<body>

<div class="container">
<h2>Upload Your Resume</h2>

<form action="{{ url_for('resume_upload') }}" method="POST" enctype="multipart/form-data" id="resumeForm">
    <div class="upload-box">
        <input type="file" name="resume_file" id="resume">
    </div>
    <div class="error" id="error"></div>
    <button type="button" onclick="validateAndSubmit()">Start Interview</button>
</form>
</div>

<script>
function validateAndSubmit(){
    let file = document.getElementById("resume").value;
    if(file == ""){
        document.getElementById("error").innerHTML = "Please upload your resume";
        return;
    }
    // This actually sends the file to Python and moves to the next page
    document.getElementById("resumeForm").submit();
}
</script>

</body>
</html>
