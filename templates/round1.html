<!DOCTYPE html>
<html>
<head>
    <title>Round 1 - Aptitude MCQs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f8ff; position: relative; padding-right: 240px; }
        .question-card { display: none; margin-bottom: 20px; }
        .question-card.active { display: block; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 12px; }
        h2 { font-weight: bold; }

        /* --- PROCTORING DASHBOARD STYLES --- */
        #proctor-dashboard {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 210px;
            z-index: 1000;
        }

        .camera-box {
            background: #000;
            border: 2px solid #3498db;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
            height: 150px;
            position: relative;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.6);
            color: #2ecc71;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: blinker 1.5s linear infinite;
        }

        #timer-container {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 0 0 8px 8px;
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            border: 2px solid #3498db;
            border-top: none;
        }

        .time-low { background: #e74c3c !important; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body class="container mt-4">

    <div id="proctor-dashboard">
        <div class="camera-box">
            <video id="camera-feed" autoplay playsinline muted></video>
            <div class="camera-label">
                <span class="dot"></span> Camera Active
            </div>
        </div>
        <div id="timer-container">
            <span id="time-display">60:00</span>
        </div>
    </div>

    <h2 class="mb-4 text-primary">Round 1 - Aptitude Questions</h2>

    <div id="progress" class="mb-3 fw-bold text-primary"></div>

    <form method="POST" action="{{ url_for('round1') }}" id="aptitudeForm">
        {% for q in questions["aptitude"] %}
        {% set q_idx = loop.index0 %}
        <div class="card question-card" id="q{{ q_idx }}">
            <div class="card-body">
                <h5 class="card-title">Question {{ loop.index }} of {{ questions["aptitude"]|length }}</h5>
                <p class="fw-semibold">{{ q["question"] }}</p>
                
                {% for opt in q["options"] %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" 
                           name="aptitude{{ q_idx }}" 
                           value="{{ opt }}" required>
                    <label class="form-check-label">{{ opt }}</label>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}

        <div class="mt-3">
            <button type="button" class="btn btn-secondary me-2" id="prevBtn">Previous</button>
            <button type="button" class="btn btn-secondary me-2" id="nextBtn">Next</button>
            <button type="submit" class="btn btn-primary px-4" id="submitBtn" style="display:none;">Submit Aptitude</button>
        </div>
    </form>

    <script>
        // Camera Init
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (err) { console.error("Camera access denied"); }
        }

        // Timer Logic (Starts NOW and persists in LocalStorage)
        function startTimer() {
            const duration = 60 * 60; // 60 minutes
            let startTime = localStorage.getItem('interview_start_time');
            
            if (!startTime) {
                startTime = Math.floor(Date.now() / 1000);
                localStorage.setItem('interview_start_time', startTime);
            }

            const display = document.querySelector('#time-display');
            const container = document.querySelector('#timer-container');

            setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                const elapsed = now - startTime;
                const remaining = duration - elapsed;

                if (remaining <= 0) {
                    alert("Time is up!");
                    document.getElementById('aptitudeForm').submit();
                    return;
                }

                let mins = Math.floor(remaining / 60);
                let secs = remaining % 60;
                display.textContent = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
                
                if (remaining < 300) container.classList.add('time-low');
            }, 1000);
        }

        // Navigation
        const cards = document.querySelectorAll('.question-card');
        const progress = document.getElementById('progress');
        let current = 0;

        function show(index) {
            cards.forEach((c, i) => c.classList.toggle('active', i === index));
            progress.textContent = `Question ${index+1} of ${cards.length}`;
            document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').style.display = index === cards.length-1 ? 'none' : 'inline-block';
            document.getElementById('submitBtn').style.display = index === cards.length-1 ? 'inline-block' : 'none';
        }

        document.getElementById('prevBtn').onclick = () => { if(current > 0) show(--current); };
        document.getElementById('nextBtn').onclick = () => { if(current < cards.length-1) show(++current); };

        window.onload = () => { show(0); startTimer(); startCamera(); };
    </script>
</body>
</html>
