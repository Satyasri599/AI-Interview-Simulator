<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coding Round - Question {{ q_index + 1 }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --main-bg: #eef2f7; --accent: #0d6efd; }
        body { background-color: var(--main-bg); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .ide-wrapper { display: flex; height: calc(100vh - 70px); gap: 15px; padding: 15px; }
        
        /* Left Pane */
        .problem-pane { width: 35%; background: white; border-radius: 12px; padding: 20px; overflow-y: auto; border: 1px solid #ddd; }
        
        /* Right Pane */
        .editor-pane { width: 65%; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .editor-box { flex-grow: 1; background: white; border-radius: 12px; border: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        textarea#editor { flex-grow: 1; border: none; padding: 20px; font-family: 'Consolas', monospace; outline: none; resize: none; background: #fdfdfd; }
        
        /* Proctoring fixed at top right */
        #proctor-dashboard { position: absolute; top: 50px; right: 20px; width: 150px; z-index: 1000; }
        .camera-box { background: #000; border: 2px solid var(--accent); border-radius: 8px; overflow: hidden; height: 110px; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .status-tray { background: white; border-radius: 12px; padding: 20px; border: 1px solid #ddd; }
        .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white px-4 shadow-sm">
    <span class="navbar-brand mb-0 h1 text-primary">Technical Assessment</span>
    <span class="ms-auto badge bg-dark">Question {{ q_index + 1 }} of {{ total_q }}</span>
</nav>

<div class="ide-wrapper">
    <div class="problem-pane">
        <h3>{{ q.question }}</h3>
        <hr>
        <div class="mt-3">
            <p><strong>Sample Input:</strong></p>
            <div class="p-2 bg-light border rounded mb-3"><code>{{ q.sample_input }}</code></div>
            <p><strong>Expected Output:</strong></p>
            <div class="p-2 bg-light border rounded"><code>{{ q.expected_output }}</code></div>
        </div>
    </div>

    <div class="editor-pane">
        <div id="proctor-dashboard">
            <div class="camera-box"><video id="camera-feed" autoplay playsinline muted></video></div>
            <div class="bg-dark text-white text-center small py-1 mt-1 rounded">Proctoring Active</div>
        </div>

        <form method="POST" style="display: contents;">
            <div class="editor-box">
                <div class="bg-light p-2 border-bottom d-flex justify-content-between">
                    <select class="form-select form-select-sm w-25">
                        <option>Python 3</option>
                        <option>Java</option>
                        <option>C++</option>
                    </select>
                </div>
                <textarea name="user_code" id="editor" placeholder="# Write your code here..." required></textarea>
            </div>

            <div class="status-tray">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Test Case Input:</label>
                    <textarea id="userInputBox" class="form-control" rows="1" placeholder="Enter custom input here..."></textarea>
                </div>

                <div class="d-flex align-items-center gap-3 mb-2">
                    <button type="button" class="btn btn-dark" id="runBtn">Run Test Case</button>
                    <div class="loader" id="runLoader"></div>
                    <div id="statusLabel" class="fw-bold text-success"></div>
                </div>

                <div id="consoleBox" class="p-3 bg-light border rounded d-none">
                    <div class="small text-muted mb-1">Console Output:</div>
                    <code id="consoleText" class="text-dark"></code>
                </div>

                <div class="d-flex justify-content-end mt-3 pt-2 border-top">
                    <button type="submit" class="btn btn-primary px-5 fw-bold">
                        {% if q_index == total_q - 1 %}Submit Coding & Proceed{% else %}Next Question{% endif %}
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('runBtn').addEventListener('click', async () => {
        const loader = document.getElementById('runLoader');
        const status = document.getElementById('statusLabel');
        const consoleBox = document.getElementById('consoleBox');
        const consoleText = document.getElementById('consoleText');
        
        loader.style.display = 'inline-block';
        status.innerText = '';
        
        // Simulating the 1 second processing time
        const response = await fetch("/run_code", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ q_index: "{{ q_index }}" })
        });
        const data = await response.json();
        
        setTimeout(() => {
            loader.style.display = 'none';
            status.innerText = 'Passed ✅';
            consoleBox.classList.remove('d-none');
            consoleText.innerText = data.output;
        }, 1000);
    });

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('camera-feed').srcObject = stream;
    }
    window.onload = startCamera;
</script>
</body>
</html>
