<!DOCTYPE html>
<html>
<head>
<title>AI Interview Portal</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1f3c88,#4facfe);height:100vh;display:flex;justify-content:center;align-items:center;}
.login-card{background:white;padding:40px;width:350px;border-radius:15px;box-shadow:0 15px 30px rgba(0,0,0,0.2);text-align:center;animation:fadeIn 1s ease;}
h2{color:#1f3c88;}
input{width:90%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{width:95%;padding:12px;margin-top:15px;background:#1f3c88;color:white;border:none;border-radius:8px;cursor:pointer;}
button:hover{background:#16306b;}
.error{color:red;font-size:14px;}
.robot{position:fixed;bottom:-260px;right:30px;width:240px;transition:1.2s;}
.robot.show{bottom:20px;}
.robot-message{position:fixed;bottom:230px;right:40px;background:white;padding:12px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);display:none;}
@keyframes fadeIn{from{opacity:0; transform:translateY(30px);}to{opacity:1; transform:translateY(0);}}
</style>
</head>
<body>
<div class="login-card">
<h2>AI Interview Portal</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<div class="error" id="error"></div>
<button onclick="login()">Login</button>
</div>
<div class="robot-message" id="msg">Hi 👋 I'm your AI Interview Assistant.<br><br><br></div>
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" class="robot" id="robot">
<script>
window.onload=function(){
setTimeout(()=>{
document.getElementById("robot").classList.add("show");
document.getElementById("msg").style.display="block";
},1000);
}
function login(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;
if(user=="" || pass==""){
document.getElementById("error").innerHTML="Please enter login credentials";
return;
}
window.location.href="{{ url_for('resume_upload') }}";
}
</script>
</body>
</html>
